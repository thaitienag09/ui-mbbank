workflows:
  ios-build:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    working_directory: .
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Prepare environment
        script: |
          brew install ldid
          chmod +x ipabuild.sh
      - name: Build IPA
        script: |
          ./ipabuild.sh
    artifacts:
      - "*.tipa"
      - "*.ipa"
      - build/*.app
    publishing:
      email:
        recipients:
          - ${{ github.actor }}@users.noreply.github.com
